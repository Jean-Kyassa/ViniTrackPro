# Application Basics
spring.application.name=vinitrackpro
server.port=8080
server.servlet.context-path=/api

# Profile Configuration
spring.profiles.active=dev

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/vinitrackpro
spring.datasource.username=postgres
spring.datasource.password=jean@1
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.connection.autocommit=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# HikariCP settings
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.connection-test-query=SELECT 1

# JWT Configuration
app.jwtSecret=yourStrongSecretKeyHereMakeItLongAndRandom
app.jwtExpirationInMs=86400000

# Client Configuration
app.client.url=http://localhost:8082/login

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Internationalization
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

file.upload-dir=uploads
